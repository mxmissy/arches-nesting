async function confirmAutoNest() {
  let results = window._autoNestResults;
  if (!results || results.length === 0) return;

  // Gather which sticks are selected
  let selectedSticks = new Set();
  document.querySelectorAll('.nest-stick-chk:checked').forEach(cb => {
    selectedSticks.add(`${cb.dataset.group}-${cb.dataset.stick}`);
  });

  if (selectedSticks.size === 0) {
    toast('No sticks selected', 'warning');
    return;
  }

  let totalLinked = 0, totalRemnants = 0;

  for (let gi = 0; gi < results.length; gi++) {
    let { sizeKey, result } = results[gi];
    for (let si = 0; si < result.usedStock.length; si++) {
      // Skip unselected sticks
      if (!selectedSticks.has(`${gi}-${si}`)) continue;

      let sp = result.usedStock[si];
      try {
        let dropInches = sp.remaining;
        // Build saw instructions
        let sawParts = sp.parts.map(p => `CF:${inchesToShortFeet(p.cutInches)}`);
        let sawInstruction = sawParts.join(' ');
        if (dropInches >= SETTINGS.minRemnant) {
          sawInstruction += ` | DROP:${inchesToDisplay(dropInches)} -> SAVE REMNANT`;
        } else if (dropInches > 1) {
          sawInstruction += ` | DROP:${inchesToDisplay(dropInches)} -> SCRAP`;
        }

        if (sp.type === 'stock') {
          // Link each part to this stock record (from Parts side)
          for (let p of sp.parts) {
            if (p.id) {
              await airtableUpdate('Parts', p.id, {
                'Stock Material': [sp.record.id]
              });
            }
          }
          // Update saw instructions on stock
          await airtableUpdate('Stock Material', sp.record.id, {
            'Saw Instructions': sawInstruction
          });
          totalLinked += sp.parts.length;

          // Create remnant if needed
          if (dropInches >= SETTINGS.minRemnant) {
            await airtableCreate('Remnants', {
              'Material Type': sp.record.materialType,
              'Material Size': sp.record.materialSize,
              'Length (ft)': Math.round(dropInches / 12 * 10) / 10,
              'Status': 'Available',
              'Notes': `nesting-app:${sp.record.id}`
            });
            totalRemnants++;
          }

        } else if (sp.type === 'remnant') {
          // Create stock record from remnant
          let newStock = await airtableCreate('Stock Material', {
            'Material Type': sp.record.materialType,
            'Material Size': sp.record.materialSize,
            'Length (ft)': sp.record.lengthFt,
            'Saw Instructions': sawInstruction
          });
          // Link each part to the new stock record (from Parts side)
          for (let p of sp.parts) {
            if (p.id) {
              await airtableUpdate('Parts', p.id, {
                'Stock Material': [newStock.id]
              });
            }
          }
          // Mark remnant as Used
          await airtableUpdate('Remnants', sp.record.id, { 'Status': 'Used' });
          totalLinked += sp.parts.length;

          if (dropInches >= SETTINGS.minRemnant) {
            await airtableCreate('Remnants', {
              'Material Type': sp.record.materialType,
              'Material Size': sp.record.materialSize,
              'Length (ft)': Math.round(dropInches / 12 * 10) / 10,
              'Status': 'Available',
              'Notes': `nesting-app:${sp.record.id}`
            });
            totalRemnants++;
          }
        }

        toast(`✅ ${sp.id} → ${sp.parts.length} part(s) linked`);
      } catch(e) {
        toast(`⚠️ Error on ${sp.id}: ${e.message}`, 'error');
      }
    }
  }

  // Store confirmed sticks for printing
  let confirmedPieces = [];
  for (let gi = 0; gi < results.length; gi++) {
    let { sizeKey, result } = results[gi];
    for (let si = 0; si < result.usedStock.length; si++) {
      if (!selectedSticks.has(`${gi}-${si}`)) continue;
      let sp = result.usedStock[si];
      sp.sizeKey = sizeKey;
      sp.parts.forEach(p => { p.cutDisplay = inchesToDisplay(p.cutInches); });
      confirmedPieces.push(sp);
    }
  }

  toast(`Done: ${totalLinked} parts linked, ${totalRemnants} remnants created`);

  // Set flag so renderAutoNest shows success screen after loadData re-renders
  window._lastConfirmedPieces = confirmedPieces;
  window._nestSuccessInfo = { totalLinked, totalRemnants };
  window._showNestSuccess = confirmedPieces.length > 0;

  await loadData();
}

function findPartsForBeam() {
  let sizeKey = document.getElementById('beam-sizekey').value;
  let feet = parseInt(document.getElementById('beam-feet').value) || 0;
  let inches = parseInt(document.getElementById('beam-inches').value) || 0;
  let frac = parseFloat(document.getElementById('beam-frac').value) || 0;
  let totalInches = (feet * 12) + inches + frac;
  let usable = totalInches - SETTINGS.endTrim;

  let unmatched = getUnmatchedParts().filter(p => {
    let a = (p.sizeKey||'').toUpperCase().replace(/[^A-Z0-9./]/g,'');
    let b = (sizeKey||'').toUpperCase().replace(/[^A-Z0-9./]/g,'');
    return a === b;
  }).sort((a, b) => b.cutInches - a.cutInches);

  if (unmatched.length === 0) {
    document.getElementById('beam-results').innerHTML =
      '<div class="card"><div class="card-body empty-state">No unmatched parts for this size key.</div></div>';
    return;
  }

  // Track selected parts
  window._beamParts = unmatched;
  window._beamTotalInches = totalInches;
  window._beamUsable = usable;
  window._beamSizeKey = sizeKey;
  window._beamSelected = new Set();

  // Auto-select best subset
  let bestIdxs = knapsackBestSubset(unmatched, usable);
  window._beamSelected = new Set(bestIdxs);

  renderBeamPartTable();
}

function renderBeamPartTable() {
  let parts = window._beamParts;
  let totalInches = window._beamTotalInches;
  let usable = window._beamUsable;
  let selected = window._beamSelected;

  let selParts = [...selected].map(i => parts[i]);
  let selTotal = selParts.reduce((s, p) => s + p.cutInches + SETTINGS.kerf, 0);
  let fits = selTotal <= usable - SETTINGS.safetyMargin;
  let remaining = usable - selTotal - SETTINGS.safetyMargin;

  let rows = parts.map((p, i) => {
    let canFit = p.cutInches + SETTINGS.kerf <= usable - SETTINGS.safetyMargin;
    let isSel = selected.has(i);
    let cls = !canFit ? 'check-row disabled' : isSel ? 'check-row selected' : 'check-row';
    return `<tr class="${cls}" onclick="${canFit ? `toggleBeamPart(${i})` : ''}">
      <td><div class="custom-check">${isSel ? '✓' : ''}</div></td>
      <td class="mono" style="font-weight:600">${escHtml(p.partId)}</td>
      <td>${escHtml(p.job)}</td>
      <td class="mono">${escHtml(p.cutLength)}</td>
      <td class="mono text-right">${p.cutInches.toFixed(1)}"</td>
      <td>${canFit ? '<span style="color:var(--clr-remnant)">✅</span>' : '<span style="color:var(--clr-scrap)">❌</span>'}</td>
    </tr>`;
  }).join('');

  // Build preview bar
  let previewParts = selParts.map(p => ({ partId: p.partId, cutInches: p.cutInches }));
  let previewSp = {
    type: 'stock', id: `${inchesToDisplay(totalInches)} beam`,
    totalLength: totalInches, usable,
    parts: previewParts, remaining
  };
  let barHtml = fits || remaining > -SETTINGS.safetyMargin ? renderBarDiagram(previewSp) : '';
  let statusMsg = !fits && selected.size > 0
    ? `<p style="color:var(--clr-scrap);font-weight:600">⚠️ Selected parts exceed capacity by ${inchesToDisplay(Math.abs(remaining))}</p>`
    : selected.size > 0
    ? `<p style="color:var(--clr-remnant);font-weight:600">✅ Fits! Remaining: ${inchesToDisplay(remaining)} ${remaining >= SETTINGS.minRemnant ? '(saves as remnant)' : remaining > 1 ? '(scrap)' : ''}</p>`
    : '<p class="text-muted">Select parts to preview</p>';

  document.getElementById('beam-results').innerHTML = `
    <div class="card">
      <div class="card-header flex-between">
        Parts for ${escHtml(window._beamSizeKey)} on ${inchesToDisplay(totalInches)} beam
        <span class="text-muted text-xs">${selected.size} selected of ${parts.length}</span>
      </div>
      <div class="card-body" style="padding:0; max-height:300px; overflow-y:auto">
        <table class="data-table">
          <thead><tr><th style="width:32px">☑</th><th>Part ID</th><th>Job</th><th>Cut Length</th><th class="text-right">Inches</th><th>Fits</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Live Preview</div>
      <div class="card-body">
        ${barHtml}
        ${statusMsg}
      </div>
    </div>

    <div class="flex gap-3">
      <button class="btn btn-success" onclick="confirmBeamNest()" ${!fits && selected.size > 0 ? 'disabled' : ''}>✅ Confirm & Link</button>
      <button class="btn" onclick="autoSelectBeamBest()">🎯 Auto Best Set</button>
      <button class="btn" onclick="selectAllBeamFitting()">☑ Select All That Fit</button>
      <button class="btn" onclick="clearBeamSelection()">Clear</button>
    </div>`;
}

function toggleBeamPart(idx) {
  let sel = window._beamSelected;
  if (sel.has(idx)) sel.delete(idx); else sel.add(idx);
  renderBeamPartTable();
}

function autoSelectBeamBest() {
  let parts = window._beamParts;
  let usable = window._beamUsable;
  let bestIdxs = knapsackBestSubset(parts, usable);
  window._beamSelected = new Set(bestIdxs);
  renderBeamPartTable();
}

function selectAllBeamFitting() {
  let parts = window._beamParts;
  let usable = window._beamUsable;
  window._beamSelected = new Set();
  let remaining = usable - SETTINGS.safetyMargin;
  // Greedy: longest first
  let sorted = parts.map((p, i) => ({ i, len: p.cutInches + SETTINGS.kerf })).sort((a, b) => b.len - a.len);
  for (let { i, len } of sorted) {
    if (len <= remaining) {
      window._beamSelected.add(i);
      remaining -= len;
    }
  }
  renderBeamPartTable();
}

function clearBeamSelection() {
  window._beamSelected = new Set();
  renderBeamPartTable();
}

async function confirmBeamNest() {
  let parts = window._beamParts;
  let selected = window._beamSelected;
  if (selected.size === 0) return;

  let selParts = [...selected].map(i => parts[i]);
  let totalInches = window._beamTotalInches;
  let selTotal = selParts.reduce((s, p) => s + p.cutInches + SETTINGS.kerf, 0);
  let remaining = window._beamUsable - selTotal - SETTINGS.safetyMargin;

  // Find matching stock record (first available of this size key at this length)
  let sizeKey = window._beamSizeKey;
  let avail = getAvailableStock().filter(s => {
    let a = (s.sizeKey||'').toUpperCase().replace(/[^A-Z0-9./]/g,'');
    let b = (sizeKey||'').toUpperCase().replace(/[^A-Z0-9./]/g,'');
    return a === b && Math.abs(s.lengthInches - totalInches) < 1;
  });

  if (avail.length === 0) {
    toast('No matching stock record found in Airtable. Create one first.', 'warning');
    return;
  }

  let stockRec = avail[0];
  try {
    let sawParts = selParts.map(p => `CF:${inchesToShortFeet(p.cutInches)}`);
    let sawInstruction = sawParts.join(' ');
    if (remaining >= SETTINGS.minRemnant) {
      sawInstruction += ` | DROP:${inchesToDisplay(remaining)} -> SAVE REMNANT`;
    } else if (remaining > 1) {
      sawInstruction += ` | DROP:${inchesToDisplay(remaining)} -> SCRAP`;
    }

    // Link each part to this stock record (from Parts side)
    for (let p of selParts) {
      if (p.id) {
        await airtableUpdate('Parts', p.id, {
          'Stock Material': [stockRec.id]
        });
      }
    }
    // Update saw instructions on stock
    await airtableUpdate('Stock Material', stockRec.id, {
      'Saw Instructions': sawInstruction
    });

    if (remaining >= SETTINGS.minRemnant) {
      await airtableCreate('Remnants', {
        'Material Type': stockRec.materialType,
        'Material Size': stockRec.materialSize,
        'Length (ft)': Math.round(remaining / 12 * 10) / 10,
        'Status': 'Available',
        'Notes': `nesting-app:${stockRec.id}`
      });
      toast(`♻️ Remnant created: ${inchesToDisplay(remaining)}`);
    }

    toast(`✅ ${selParts.length} parts linked to ${stockRec.tag}`);

    // Build piece for printing
    let confirmedPiece = {
      type: 'stock',
      id: stockRec.tag || `STK-${stockRec.id.slice(-4)}`,
      totalLength: totalInches,
      usable: window._beamUsable,
      record: stockRec,
      parts: selParts.map(p => ({ id: p.id, partId: p.partId, cutInches: p.cutInches, cutDisplay: inchesToDisplay(p.cutInches) })),
      remaining,
      sizeKey: sizeKey,
      sawInstructions: sawInstruction
    };
    window._lastConfirmedPieces = [confirmedPiece];
    window._showBeamSuccess = true;
    window._beamSuccessInfo = {
      count: selParts.length,
      tag: stockRec.tag,
      remnant: remaining >= SETTINGS.minRemnant ? inchesToDisplay(remaining) : null
    };

    await loadData();

  } catch(e) {
    toast(`Error: ${e.message}`, 'error');
  }
}

function getCutEntries() {
  let rows = document.querySelectorAll('.cut-row');
  let cuts = [];
  rows.forEach((row, i) => {
    let inputs = row.querySelectorAll('input');
    let select = row.querySelector('select');
    let ft = parseInt(inputs[0].value) || 0;
    let inches = parseInt(inputs[1].value) || 0;
    let frac = parseFloat(select.value) || 0;
    let total = (ft * 12) + inches + frac;
    if (total > 0) cuts.push({ index: i + 1, cutInches: total, cutDisplay: inchesToDisplay(total), partId: `Cut ${i+1}` });
  });
  return cuts;
}

function updateCutsTotal() {
  let cuts = getCutEntries();
  let total = cuts.reduce((s, c) => s + c.cutInches, 0);
  document.getElementById('cuts-total').textContent =
    `${cuts.length} cuts = ${total.toFixed(1)}" (${inchesToDisplay(total)})`;

  // Update per-row totals
  let rows = document.querySelectorAll('.cut-row');
  rows.forEach(row => {
    let inputs = row.querySelectorAll('input');
    let select = row.querySelector('select');
    let ft = parseInt(inputs[0].value) || 0;
    let inches = parseInt(inputs[1].value) || 0;
    let frac = parseFloat(select.value) || 0;
    let t = (ft * 12) + inches + frac;
    row.querySelector('.cut-total-display').textContent = t > 0 ? inchesToDisplay(t) : '0"';
  });
}

function findStockForCuts() {
  let sizeKey = document.getElementById('cuts-sizekey').value;
  let cuts = getCutEntries();
  if (cuts.length === 0) {
    toast('Enter at least one cut dimension', 'warning');
    return;
  }

  // Sort cuts longest first
  cuts.sort((a, b) => b.cutInches - a.cutInches);

  let avail = getAvailableStock();
  let pool = buildStockPool(sizeKey, avail, DATA.remnants);

  if (pool.length === 0) {
    document.getElementById('cuts-results').innerHTML = `
      <div class="card"><div class="card-body">
        <p style="color:var(--clr-scrap);font-weight:600">No stock available for ${escHtml(sizeKey)}</p>
        <p class="text-muted mt-2">Suggested order: calculate total length needed and order accordingly.</p>
      </div></div>`;
    return;
  }

  let result = runGreedyOptimizer(cuts, pool);
  let barsHtml = result.usedStock.map(sp => renderBarDiagram(sp)).join('');

  let totalWaste = result.usedStock.reduce((s, sp) => {
    let d = sp.remaining;
    return s + (d >= SETTINGS.minRemnant ? 0 : d);
  }, 0);

  document.getElementById('cuts-results').innerHTML = `
    <div class="card">
      <div class="card-header">Optimized Cutting Plan</div>
      <div class="card-body">
        ${barsHtml}
        <hr class="divider">
        <p class="text-mono">Total waste: ${inchesToDisplay(totalWaste)}</p>
        ${result.unassigned.length > 0 ? `<p style="color:var(--clr-scrap)">⚠️ ${result.unassigned.length} cut(s) don't fit any available stock</p>` : ''}
        <div class="legend mt-2">
          <div class="legend-item"><div class="legend-swatch" style="background:var(--clr-part)"></div>Cut</div>
          <div class="legend-item"><div class="legend-swatch" style="background:var(--clr-remnant)"></div>Remnant</div>
          <div class="legend-item"><div class="legend-swatch" style="background:var(--clr-scrap)"></div>Scrap</div>
        </div>
      </div>
    </div>`;
}

  let stockSection = document.getElementById('sp-stock-length-section');
  let findInfo = document.getElementById('sp-find-stock-info');

  if (mode === 'known') {
    knownBtn.style.background = 'var(--clr-stock)';

function spToggleLengths(selectAll) {
  document.querySelectorAll('.sp-len-chk').forEach(cb => {
    cb.checked = selectAll;
    spUpdateLengthStyle(cb.parentElement);
  });
}

function spUpdateLengthStyle(label) {
  let cb = label.querySelector('input');
  if (cb.checked) {
    label.style.background = '#E3F2FD';
    label.style.borderColor = 'var(--clr-stock)';
    label.style.color = 'var(--clr-text)';
  } else {
    label.style.background = 'var(--bg-card)';
    label.style.borderColor = 'var(--clr-border)';
    label.style.color = 'var(--clr-text-light)';
  }
}

function spGetSelectedLengths() {
  let lengths = [];
  document.querySelectorAll('.sp-len-chk:checked').forEach(cb => {
    lengths.push(parseInt(cb.value) * 12); // convert feet to inches
  });
  return lengths.sort((a, b) => a - b);
}

function spGetCuts() {
  let rows = document.querySelectorAll('.sp-cut-row');
  let cuts = [];
  rows.forEach(row => {
    let inputs = row.querySelectorAll('input');
    let select = row.querySelector('select');
    let label = inputs[0].value.trim() || '';
    let ft = parseInt(inputs[1].value) || 0;
    let inch = parseInt(inputs[2].value) || 0;
    let frac = parseFloat(select.value) || 0;
    let qty = parseInt(inputs[3].value) || 1;
    let totalInches = (ft * 12) + inch + frac;
    if (totalInches > 0) {
      for (let q = 0; q < qty; q++) {
        cuts.push({
          partId: label || `Cut`,
          cutInches: totalInches,
          cutDisplay: inchesToDisplay(totalInches),
          label, ft, inch, frac: String(frac), qty
        });
      }
    }
  });
  return cuts;
}

function spUpdateSummary() {
  let rows = document.querySelectorAll('.sp-cut-row');
  let totalCuts = 0;
  let totalInches = 0;

  rows.forEach(row => {
    let inputs = row.querySelectorAll('input');
    let select = row.querySelector('select');
    let ft = parseInt(inputs[1].value) || 0;
    let inch = parseInt(inputs[2].value) || 0;
    let frac = parseFloat(select.value) || 0;
    let qty = parseInt(inputs[3].value) || 1;
    let len = (ft * 12) + inch + frac;
    let rowTotal = row.querySelector('.sp-row-total');
    if (len > 0) {
      rowTotal.textContent = `${inchesToDisplay(len)}${qty > 1 ? ' ×'+qty : ''}`;
      totalCuts += qty;
      totalInches += len * qty;
    } else {
      rowTotal.textContent = '—';
    }
  });

  let sumEl = document.getElementById('sp-cut-summary');
  if (sumEl) sumEl.textContent = `${totalCuts} cut${totalCuts!==1?'s':''} = ${inchesToDisplay(totalInches)} total`;
}

function spClearCuts() {
  document.getElementById('sp-cut-body').innerHTML = '';
  _spCutCounter = 0;
  spAddCut(5);
}

function spOptimize() {
  let cuts = spGetCuts();
  if (cuts.length === 0) { toast('Enter at least one cut', 'warning'); return; }

  // Read cutting params
  let kerf = parseFloat(document.getElementById('sp-kerf').value) || 0.125;
  let endTrim = parseFloat(document.getElementById('sp-endtrim').value) || 0.375;
  let safety = parseFloat(document.getElementById('sp-safety').value) || 1.0;
  let minRemnant = parseFloat(document.getElementById('sp-minrem').value) || 48;
  let material = document.getElementById('sp-material').value.trim();

  // Label duplicates with sequence numbers
  let labelCounts = {};
  for (let c of cuts) {
    let key = c.partId;
    labelCounts[key] = (labelCounts[key] || 0) + 1;
  }
  let labelSeq = {};
  for (let c of cuts) {
    let key = c.partId;
    if (labelCounts[key] > 1) {
      labelSeq[key] = (labelSeq[key] || 0) + 1;
      c.partId = `${key}-${labelSeq[key]}`;
    }
  }

  // Sort cuts longest first
  cuts.sort((a, b) => b.cutInches - a.cutInches);

  // Dispatch based on mode
  if (_spMode === 'find') {
    spOptimizeFindStock(cuts, kerf, endTrim, safety, minRemnant, material);
  } else {
    spOptimizeKnownStock(cuts, kerf, endTrim, safety, minRemnant, material);
  }
}

// ============================================================
// FIND BEST STOCK MODE — Uses dual-strategy knapsack optimizer
// ============================================================
function spOptimizeFindStock(cuts, kerf, endTrim, safety, minRemnant, material) {
  let standardLengths = spGetSelectedLengths();

  if (standardLengths.length === 0) {
    toast('Select at least one stock length to consider', 'warning'); return;
  }

  // Check for cuts that won't fit any selected length
  let maxUsable = Math.max(...standardLengths) - endTrim;
  let tooBig = cuts.filter(c => c.cutInches + kerf + safety > maxUsable);
  if (tooBig.length > 0) {
    document.getElementById('sp-results').innerHTML = `
      <div class="card"><div class="card-body">
        <p style="color:var(--clr-scrap);font-weight:600">⚠️ ${tooBig.length} cut(s) won't fit on the longest selected stock (${Math.max(...standardLengths)/12}'):</p>
        <p class="text-muted mt-2">${tooBig.map(c => `${c.partId}: ${c.cutDisplay}`).join(', ')}</p>
        <p class="text-muted mt-2">These cuts exceed the maximum orderable length.</p>
      </div></div>`;
    return;
  }

  // Save/restore global SETTINGS for the optimizer
  let origKerf = SETTINGS.kerf;
  let origEndTrim = SETTINGS.endTrim;
  let origSafety = SETTINGS.safetyMargin;
  let origMinRem = SETTINGS.minRemnant;
  SETTINGS.kerf = kerf;
  SETTINGS.endTrim = endTrim;
  SETTINGS.safetyMargin = safety;
  SETTINGS.minRemnant = minRemnant;

  // Run the dual-strategy virtual optimizer (same one used in Phase 2 Auto Nest)
  let result = runVirtualOptimizer(cuts, standardLengths);

  // Restore SETTINGS
  SETTINGS.kerf = origKerf;
  SETTINGS.endTrim = origEndTrim;
  SETTINGS.safetyMargin = origSafety;
  SETTINGS.minRemnant = origMinRem;

  let usedStock = result.usedStock;

  // Save state
  window._sawPlannerState = {
    stockFt: 20, stockIn: 0, stockFrac: '0', material, cuts: [], mode: 'find'
  };

  // Render results
  let totalUsedInches = cuts.reduce((s, c) => s + c.cutInches, 0);
  let totalMaterial = usedStock.reduce((s, sp) => s + sp.totalLength, 0);
  let totalWaste = 0;
  let totalRemnants = 0;

  // Build bar diagrams and saw instructions
  let barsHtml = '';
  let sawInstructionsList = [];

  // Store globally for print function
  window._spLastResult = {
    material, stockLength: null, kerf, endTrim, safety, minRemnant,
    cuts, usedStock: [], sawInstructions: [], mode: 'find'
  };

  // Build order summary: group sticks by length
  let orderSummary = {};

  for (let i = 0; i < usedStock.length; i++) {
    let sp = usedStock[i];
    sp.id = `Stick ${i + 1}`;
    let drop = sp.remaining;
    let isRemnant = drop >= minRemnant;
    if (!isRemnant) totalWaste += drop;
    if (isRemnant) totalRemnants++;

    // Track order summary
    let lenFt = sp.totalLength / 12;
    orderSummary[lenFt] = (orderSummary[lenFt] || 0) + 1;

    // Temporarily set SETTINGS for bar renderer
    let oK = SETTINGS.kerf, oE = SETTINGS.endTrim, oM = SETTINGS.minRemnant;
    SETTINGS.kerf = kerf;
    SETTINGS.endTrim = endTrim;
    SETTINGS.minRemnant = minRemnant;
    barsHtml += renderBarDiagram(sp);
    SETTINGS.kerf = oK;
    SETTINGS.endTrim = oE;
    SETTINGS.minRemnant = oM;

    // Build saw instruction line
    let sawParts = sp.parts.map(p => `CF:${inchesToShortFeet(p.cutInches)}`);
    let sawLine = sawParts.join('  ');
    if (isRemnant) {
      sawLine += `  |  DROP: ${inchesToDisplay(drop)} → SAVE REMNANT`;
    } else if (drop > 1) {
      sawLine += `  |  DROP: ${inchesToDisplay(drop)} → SCRAP`;
    }
    sawInstructionsList.push({
      stickNum: i + 1,
      stockLength: sp.totalLength,
      line: sawLine,
      parts: sp.parts,
      drop,
      isRemnant
    });
  }

  // Update global for print
  window._spLastResult.sawInstructions = sawInstructionsList;
  window._spLastResult.usedStock = usedStock;

  let utilPct = totalMaterial > 0 ? ((totalUsedInches / totalMaterial) * 100).toFixed(1) : '0';
  let wastePct = totalMaterial > 0 ? ((totalWaste / totalMaterial) * 100).toFixed(1) : '0';

  // Build order list HTML
  let orderKeys = Object.keys(orderSummary).sort((a, b) => parseFloat(a) - parseFloat(b));
  let orderListHtml = orderKeys.map(ft => {
    let count = orderSummary[ft];
    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--clr-ordered-light);border-radius:var(--radius-sm);border:1px solid #E1BEE7">
      <span style="font-size:22px;font-weight:700;color:var(--clr-ordered)">${count}×</span>
      <span style="font-size:16px;font-weight:600">${ft}' beam</span>
    </div>`;
  }).join('');

  // Saw instruction text block for printing
  let sawTextBlock = '';
  sawTextBlock += `SAW INSTRUCTIONS${material ? ' — ' + material : ''}\n`;
  sawTextBlock += `ORDER: ${orderKeys.map(ft => `${orderSummary[ft]}× ${ft}'`).join(', ')}\n`;
  sawTextBlock += `Date: ${new Date().toLocaleDateString()}\n`;
  sawTextBlock += `Kerf: ${kerf}" | End Trim: ${endTrim}" | Safety: ${safety}"\n`;
  sawTextBlock += '═'.repeat(60) + '\n\n';

  for (let s of sawInstructionsList) {
    let stickLenFt = s.stockLength / 12;
    sawTextBlock += `STICK ${s.stickNum}  —  ${stickLenFt}' beam  (${s.parts.length} cut${s.parts.length!==1?'s':''})\n`;
    sawTextBlock += `  ${s.line}\n`;
    for (let j = 0; j < s.parts.length; j++) {
      let p = s.parts[j];
      sawTextBlock += `    Cut ${j+1}: ${p.partId} → ${p.cutDisplay} (${p.cutInches.toFixed(2)}")\n`;
    }
    if (s.isRemnant) {
      sawTextBlock += `    ♻️ Remnant: ${inchesToDisplay(s.drop)}\n`;
    } else if (s.drop > 1) {
      sawTextBlock += `    🗑️ Scrap: ${inchesToDisplay(s.drop)}\n`;
    }
    sawTextBlock += '\n';
  }

  sawTextBlock += '═'.repeat(60) + '\n';
  sawTextBlock += `SUMMARY: ${cuts.length} cuts on ${usedStock.length} stick${usedStock.length!==1?'s':''}\n`;

function spParseMaterial(materialStr) {
  // Try to parse "W18x35" or "HSS-8x8x3/16" or "W-12x190" into type + size
  let parsed = { type: null, size: null, raw: materialStr };
  if (!materialStr) return parsed;

  // Common patterns:
  // W18x35, W-18x35, W 18x35 → type=W, size=18x35
  // HSS8x8x3/16, HSS-8x8x3/16 → type=HSS, size=8x8x3/16
  // TS6x4x1/4, TS-6x4x1/4 → type=TS, size=6x4x1/4
  let m = materialStr.match(/^(W|HSS|TS|C|MC|L|WT|HP|S|M)[-\s]?(.+)$/i);
  if (m) {
    parsed.type = m[1].toUpperCase();
    parsed.size = m[2].trim();
  }
  return parsed;
}

async function spCreatePO() {
  let d = window._spLastResult;
  if (!d || !d.usedStock || d.usedStock.length === 0) {
    toast('No results to create PO from', 'warning'); return;
  }
  if (!SETTINGS.baseId || !SETTINGS.apiKey) {
    toast('Airtable not connected — go to Settings', 'error'); return;
  }

  let btn = document.getElementById('sp-create-po-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Creating stock records...'; }

  let material = d.material || '';
  let parsed = spParseMaterial(material);
  let created = 0;
  let errors = [];
  let newStockIds = [];

  for (let i = 0; i < d.usedStock.length; i++) {
    let sp = d.usedStock[i];
    let sawInfo = d.sawInstructions[i];

    try {
      let lengthFt = Math.round(sp.totalLength / 12 * 10) / 10;

      // Build note with cut context
      let noteLines = [];
      if (material) noteLines.push(`Material: ${material}`);
      noteLines.push(`Saw Planner — ${sp.parts.length} cut${sp.parts.length!==1?'s':''}`);
      for (let j = 0; j < sp.parts.length; j++) {
        let p = sp.parts[j];
        noteLines.push(`  ${p.partId}: ${p.cutDisplay}`);
      }
      let noteText = noteLines.join('\n');

      // Build create fields
      let createFields = {
        'Length (ft)': lengthFt,
        'Select for PO': true,
        'Notes': noteText
      };

      // Add saw instructions
      if (sawInfo) createFields['Saw Instructions'] = sawInfo.line;

      // Add parsed material type/size if available
      if (parsed.type) createFields['Material Type'] = parsed.type;
      if (parsed.size) createFields['Material Size'] = parsed.size;

      console.log('[SP-PO] Creating stock:', JSON.stringify(createFields));

      let newStock = await airtableCreate('Stock Material', createFields);
      console.log('[SP-PO] Created:', newStock.id, JSON.stringify(newStock.fields));
      newStockIds.push(newStock.id);
      created++;

    } catch(e) {
      console.error('[SP-PO] Create error:', e.message);
      errors.push(`Stick ${i+1}: ${e.message}`);
    }
  }

  if (errors.length > 0) {
    toast(`⚠️ Created ${created} of ${d.usedStock.length}. Errors: ${errors.join(' | ')}`, 'error');
  } else {
    toast(`📦 Created ${created} stock record${created!==1?'s':''} for PO — ready in Airtable`);
  }
  console.log('[SP-PO] Done. Created IDs:', newStockIds, 'Errors:', errors);

  if (btn) {
    btn.disabled = true;
    btn.textContent = `✅ Created ${created} stock record${created!==1?'s':''}`;
    btn.style.background = 'var(--clr-remnant)';
    btn.style.borderColor = 'var(--clr-remnant)';
  }

  // Refresh data if connected
  if (DATA.loaded) await loadData();
}

// ============================================================
// KNOWN STOCK LENGTH MODE — Original BFD optimizer
// ============================================================
function spOptimizeKnownStock(cuts, kerf, endTrim, safety, minRemnant, material) {
  // Read stock length
  let stockFt = parseInt(document.getElementById('sp-stock-ft').value) || 20;
  let stockIn = parseInt(document.getElementById('sp-stock-in').value) || 0;
  let stockFrac = parseFloat(document.getElementById('sp-stock-frac').value) || 0;
  let stockLength = (stockFt * 12) + stockIn + stockFrac;

  // Save state
  window._sawPlannerState = {
    stockFt, stockIn, stockFrac: String(stockFrac), material, cuts: [], mode: 'known'
  };

  // Check for cuts that won't fit any single stock piece
  let usable = stockLength - endTrim;
  let tooBig = cuts.filter(c => c.cutInches + kerf + safety > usable);
  if (tooBig.length > 0) {
    document.getElementById('sp-results').innerHTML = `
      <div class="card"><div class="card-body">
        <p style="color:var(--clr-scrap);font-weight:600">⚠️ ${tooBig.length} cut(s) won't fit on a ${inchesToDisplay(stockLength)} piece:</p>
        <p class="text-muted mt-2">${tooBig.map(c => `${c.partId}: ${c.cutDisplay}`).join(', ')}</p>
        <p class="text-muted mt-2">Use a longer stock piece or shorten these cuts.</p>
      </div></div>`;
    return;
  }

  // Build unlimited stock pool (create enough pieces to hold all cuts)
  let maxPieces = cuts.length + 5; // worst case: one cut per piece plus spares
  let pool = [];
  for (let i = 0; i < maxPieces; i++) {
    pool.push({
      type: 'stock',
      id: `Stick ${i + 1}`,
      totalLength: stockLength,
      usable: stockLength - endTrim,
      parts: [],
      remaining: stockLength - endTrim
    });
  }

  // Run BFD optimization
  // Sort parts longest first, assign each to tightest-fitting stock
  let remaining = [...cuts];
  for (let part of remaining) {
    let bestSp = null;
    let bestRem = Infinity;
    for (let sp of pool) {
      let afterPlace = sp.remaining - part.cutInches - kerf;
      if (afterPlace >= 0 && afterPlace < bestRem) {
        bestRem = afterPlace;
        bestSp = sp;
      }
    }
    if (bestSp) {
      bestSp.parts.push(part);
      bestSp.remaining -= (part.cutInches + kerf);
    }
  }

  let usedStock = pool.filter(sp => sp.parts.length > 0);

  // Render results
  let totalMaterial = usedStock.length * stockLength;
  let totalUsedInches = cuts.reduce((s, c) => s + c.cutInches, 0);
  let totalWaste = 0;
  let totalRemnants = 0;

  // Build bar diagrams and saw instructions
  let barsHtml = '';
  let sawInstructionsList = [];

  // Store globally for print function
  window._spLastResult = {
    material, stockLength, kerf, endTrim, safety, minRemnant,
    cuts, usedStock: [], sawInstructions: []
  };

  for (let i = 0; i < usedStock.length; i++) {
    let sp = usedStock[i];
    sp.id = `Stick ${i + 1}`;
    let drop = sp.remaining;
    let isRemnant = drop >= minRemnant;
    if (!isRemnant) totalWaste += drop;
    if (isRemnant) totalRemnants++;

    // Use the shared bar renderer with temp settings override
    let origKerf = SETTINGS.kerf;
    let origEndTrim = SETTINGS.endTrim;
    let origMinRem = SETTINGS.minRemnant;
    SETTINGS.kerf = kerf;
    SETTINGS.endTrim = endTrim;
    SETTINGS.minRemnant = minRemnant;
    barsHtml += renderBarDiagram(sp);
    SETTINGS.kerf = origKerf;
    SETTINGS.endTrim = origEndTrim;
    SETTINGS.minRemnant = origMinRem;

    // Build saw instruction line
    let sawParts = sp.parts.map(p => `CF:${inchesToShortFeet(p.cutInches)}`);
    let sawLine = sawParts.join('  ');
    if (isRemnant) {
      sawLine += `  |  DROP: ${inchesToDisplay(drop)} → SAVE REMNANT`;
    } else if (drop > 1) {
      sawLine += `  |  DROP: ${inchesToDisplay(drop)} → SCRAP`;
    }
    sawInstructionsList.push({
      stickNum: i + 1,
      line: sawLine,
      parts: sp.parts,
      drop,
      isRemnant
    });
  }

  // Update global for print
  window._spLastResult.sawInstructions = sawInstructionsList;
  window._spLastResult.usedStock = usedStock;

  let utilPct = totalMaterial > 0 ? ((totalUsedInches / totalMaterial) * 100).toFixed(1) : '0';
  let wastePct = totalMaterial > 0 ? ((totalWaste / totalMaterial) * 100).toFixed(1) : '0';

  // Saw instruction text block for printing
  let sawTextBlock = '';
  sawTextBlock += `SAW INSTRUCTIONS${material ? ' — ' + material : ''}\n`;
  sawTextBlock += `Stock: ${inchesToDisplay(stockLength)} pieces\n`;
  sawTextBlock += `Date: ${new Date().toLocaleDateString()}\n`;
  sawTextBlock += `Kerf: ${kerf}" | End Trim: ${endTrim}" | Safety: ${safety}"\n`;
  sawTextBlock += '═'.repeat(60) + '\n\n';

  for (let s of sawInstructionsList) {
    sawTextBlock += `STICK ${s.stickNum}  (${s.parts.length} cut${s.parts.length!==1?'s':''})\n`;
    sawTextBlock += `  ${s.line}\n`;
    for (let j = 0; j < s.parts.length; j++) {
      let p = s.parts[j];
      sawTextBlock += `    Cut ${j+1}: ${p.partId} → ${p.cutDisplay} (${p.cutInches.toFixed(2)}")\n`;
    }
    if (s.isRemnant) {
      sawTextBlock += `    ♻️ Remnant: ${inchesToDisplay(s.drop)}\n`;
    } else if (s.drop > 1) {
      sawTextBlock += `    🗑️ Scrap: ${inchesToDisplay(s.drop)}\n`;
    }
    sawTextBlock += '\n';
  }

  sawTextBlock += '═'.repeat(60) + '\n';
  sawTextBlock += `SUMMARY: ${cuts.length} cuts on ${usedStock.length} stick${usedStock.length!==1?'s':''}\n`;
  sawTextBlock += `Utilization: ${utilPct}% | Waste: ${inchesToDisplay(totalWaste)} (${wastePct}%)\n`;
  sawTextBlock += `Remnants to save: ${totalRemnants}\n`;

  document.getElementById('sp-results').innerHTML = `
    <div class="card">
      <div class="card-header flex-between">
        Optimized Cut Plan${material ? ' — ' + escHtml(material) : ''}
        <span class="text-muted text-xs">${cuts.length} cuts on ${usedStock.length} × ${inchesToDisplay(stockLength)} pieces</span>
      </div>
      <div class="card-body">
        <div class="summary-grid mb-4">
          <div class="summary-item"><div class="summary-val" style="color:var(--clr-stock)">${usedStock.length}</div><div class="summary-label">Sticks Needed</div></div>
          <div class="summary-item"><div class="summary-val">${cuts.length}</div><div class="summary-label">Total Cuts</div></div>
          <div class="summary-item"><div class="summary-val" style="color:${parseFloat(utilPct)>=85?'var(--clr-remnant)':'var(--clr-part)'}">${utilPct}%</div><div class="summary-label">Utilization</div></div>
          <div class="summary-item"><div class="summary-val" style="color:var(--clr-scrap)">${inchesToDisplay(totalWaste)}</div><div class="summary-label">Total Waste</div></div>
          <div class="summary-item"><div class="summary-val" style="color:var(--clr-remnant)">${totalRemnants}</div><div class="summary-label">Remnants Saved</div></div>
        </div>

        <div class="legend mb-4">
          <div class="legend-item"><div class="legend-swatch" style="background:var(--clr-part)"></div>Cut</div>
          <div class="legend-item"><div class="legend-swatch" style="background:var(--clr-remnant)"></div>Remnant (saved)</div>
          <div class="legend-item"><div class="legend-swatch" style="background:var(--clr-scrap)"></div>Scrap (waste)</div>
          <div class="legend-item"><div class="legend-swatch" style="background:#333"></div>Kerf</div>
        </div>

        ${barsHtml}
      </div>
    </div>

    <div class="card">
      <div class="card-header flex-between">
        Saw Instructions
        <div class="flex gap-2">
          <button class="btn btn-sm" onclick="spCopyInstructions()">📋 Copy</button>
          <button class="btn btn-sm" onclick="spPrintInstructions()">🖨️ Print</button>
        </div>
      </div>
      <div class="card-body" style="padding:0">
        <pre id="sp-saw-text" style="padding:16px;margin:0;font-family:var(--font-mono);font-size:12px;white-space:pre-wrap;background:#F9FAFB;border-radius:0 0 var(--radius) var(--radius);line-height:1.6;max-height:500px;overflow-y:auto">${escHtml(sawTextBlock)}</pre>
      </div>
    </div>`;
}

function spCopyInstructions() {
  let text = document.getElementById('sp-saw-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    toast('Saw instructions copied to clipboard');
  }).catch(() => {
    // Fallback
    let ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    toast('Saw instructions copied');
  });
}

// ============================================================
// CUT QUEUE
// ============================================================
function buildNestedStockPieces() {
  // Reconstruct bar-renderable stockPiece objects from Airtable data
  let nested = getNestedStock();
  let pieces = [];

  for (let s of nested) {
    // Find the actual part records assigned to this stock
    let linkedParts = DATA.parts.filter(p =>
      p.stockMaterial && p.stockMaterial.some(sm =>
        (typeof sm === 'string' ? sm : sm.id) === s.id
      )
    );

    let totalLength = s.lengthInches;
    let usable = totalLength - SETTINGS.endTrim;
    let usedInches = 0;
    let parts = [];

    for (let lp of linkedParts) {
      parts.push({
        id: lp.id,
        partId: lp.partId,
        cutInches: lp.cutInches,
        cutDisplay: inchesToDisplay(lp.cutInches)
      });
      usedInches += lp.cutInches + SETTINGS.kerf;
    }

    let remaining = usable - usedInches - SETTINGS.safetyMargin;
    if (remaining < 0) remaining = 0;

    pieces.push({
      type: 'stock',
      id: s.tag || `STK-${s.id.slice(-4)}`,
      totalLength,
      usable,
      record: s,
      parts,
      remaining,
      sizeKey: s.sizeKey || s.materialSize || 'Unknown',
      sawInstructions: s.sawInstructions || ''
    });
  }

  return pieces;
}

function renderCutQueue(el) {
  let pieces = buildNestedStockPieces();

  if (pieces.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📄</div><p>No confirmed nestings yet. Run Auto Nest or Beam→Parts to queue up cut sheets.</p></div>';
    return;
  }

  window._cutQueuePieces = pieces;
  window._cutQueueSelected = new Set();
  // Select all by default
  pieces.forEach((_, i) => window._cutQueueSelected.add(i));

  // Group by size key
  let groups = {};
  for (let i = 0; i < pieces.length; i++) {
    let key = pieces[i].sizeKey;
    if (!groups[key]) groups[key] = [];
    groups[key].push(i);
  }

  let sizeKeys = Object.keys(groups).sort();
  let sticksHtml = '';

  for (let sk of sizeKeys) {
    let indices = groups[sk];
    sticksHtml += `<div class="cq-group">
      <div class="cq-group-header">${escHtml(sk)} <span class="text-muted">(${indices.length} stick${indices.length !== 1 ? 's' : ''})</span></div>`;

    for (let idx of indices) {
      let sp = pieces[idx];
      sticksHtml += `
        <div class="nest-stick-row" style="margin-bottom:10px">
          <label class="stick-select">
            <input type="checkbox" class="cq-stick-chk" data-idx="${idx}" checked onchange="updateCqSelectionCount()">
          </label>
          <div class="stick-bar-wrap">
            ${renderBarDiagram(sp)}
            <div class="cq-saw-line"><span class="text-xs text-muted mono">${escHtml(sp.sawInstructions)}</span></div>
          </div>
        </div>`;
    }
    sticksHtml += '</div>';
  }

  el.innerHTML = `
    <div class="card">
      <div class="card-header flex-between">
        📄 Confirmed Nestings — Ready to Print
        <span class="text-muted text-xs">${pieces.length} stock piece(s) with saw instructions</span>
      </div>
      <div class="card-body">
        ${sticksHtml}
      </div>
    </div>
    <div class="nest-confirm-bar">
      <div class="nest-confirm-left">
        <button class="btn btn-sm" onclick="toggleAllCqSticks(true)">Select All</button>
        <button class="btn btn-sm" onclick="toggleAllCqSticks(false)">Clear All</button>
        <span class="text-muted text-sm" id="cq-select-count">${pieces.length} of ${pieces.length} sticks selected</span>
      </div>
      <button class="btn btn-primary" id="btn-cq-print" onclick="printSelectedCutQueue()">🖨️ Print Selected (${pieces.length})</button>
    </div>`;
}

function toggleAllCqSticks(checked) {
  let pieces = window._cutQueuePieces || [];
  window._cutQueueSelected = checked ? new Set(pieces.map((_, i) => i)) : new Set();
  document.querySelectorAll('.cq-stick-chk').forEach(cb => cb.checked = checked);
  updateCqSelectionCount();
}

function updateCqSelectionCount() {
  window._cutQueueSelected = new Set();
  document.querySelectorAll('.cq-stick-chk:checked').forEach(cb => {
    window._cutQueueSelected.add(parseInt(cb.dataset.idx));
  });
  let all = document.querySelectorAll('.cq-stick-chk');
  let checked = window._cutQueueSelected.size;
  let el = document.getElementById('cq-select-count');
  let btn = document.getElementById('btn-cq-print');
  if (el) el.textContent = `${checked} of ${all.length} sticks selected`;
  if (btn) {
    btn.textContent = `🖨️ Print Selected (${checked})`;
    btn.disabled = checked === 0;
  }
  // Dim unselected
  document.querySelectorAll('.cq-stick-chk').forEach(cb => {
    let wrap = cb.closest('.nest-stick-row');
    if (wrap) {
      wrap.querySelector('.stick-bar-wrap').style.opacity = cb.checked ? '1' : '0.35';
    }
  });
}

// UNDO
// ============================================================
function renderUndo(el) {
  let nested = getNestedStock();

  if (nested.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">↩️</div><p>No nested stock to undo.</p></div>';
    return;
  }

  window._undoSelected = new Set();

  let rows = nested.map((s, i) => {
    // Resolve part IDs from assignedParts record IDs
    let partIds = (s.assignedParts || []).map(pid => {
      let recId = typeof pid === 'object' ? pid.id : pid;
      let partRec = DATA.parts.find(p => p.id === recId);
      return partRec ? partRec.partId : recId.slice(-6);
    });
    return `
    <tr class="check-row" onclick="toggleUndo(${i})">
      <td><div class="custom-check" id="undo-check-${i}"></div></td>
      <td class="mono" style="font-weight:600">${escHtml(s.tag)}</td>
      <td>${escHtml(s.materialSize)}</td>
      <td class="mono" style="font-size:12px">${partIds.map(p => `<span style="background:#F3F4F6;padding:1px 5px;border-radius:3px;margin:1px;display:inline-block">${escHtml(p)}</span>`).join('')}</td>
      <td class="text-xs mono" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${escHtml(s.sawInstructions)}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="card">
      <div class="card-header flex-between">
        Recently Nested Stock
        <span class="text-muted text-xs">${nested.length} stock piece(s) with assignments</span>
      </div>
      <div class="card-body" style="padding:0">
        <table class="data-table"><thead><tr>
          <th style="width:32px">☑</th><th>Stock Tag</th><th>Material</th>
          <th>Parts</th><th>Saw Instructions</th>
        </tr></thead><tbody>${rows}</tbody></table>
      </div>
    </div>
    <div class="flex gap-3">
      <button class="btn btn-danger" onclick="executeUndo(false)">↩️ Undo Selected</button>
      <button class="btn btn-danger" onclick="executeUndo(true)">↩️ Undo ALL</button>
    </div>`;

  window._undoStock = nested;
}

function toggleUndo(idx) {
  let sel = window._undoSelected;
  if (sel.has(idx)) sel.delete(idx); else sel.add(idx);
  let el = document.getElementById(`undo-check-${idx}`);
  let row = el.closest('tr');
  if (sel.has(idx)) {
    el.textContent = '✓';
    row.classList.add('selected');
  } else {
    el.textContent = '';
    row.classList.remove('selected');
  }
}

async function executeUndo(all) {
  let stock = window._undoStock;
  let toUndo = all ? stock : [...window._undoSelected].map(i => stock[i]);
  if (toUndo.length === 0) { toast('Select stock to undo', 'warning'); return; }

  for (let s of toUndo) {
    try {
      // Unlink each assigned part (from Parts side)
      if (s.assignedParts && s.assignedParts.length > 0) {
        for (let partLink of s.assignedParts) {
          let partId = typeof partLink === 'object' ? partLink.id : partLink;
          if (!partId) continue;
          try {
            await airtableUpdate('Parts', partId, {
              'Stock Material': [],
              'Material Ordered': false
            });
          } catch(e2) {
            // Part may already be unlinked, continue
          }
        }
      }
      // Clear saw instructions (critical)
      await airtableUpdate('Stock Material', s.id, {
        'Saw Instructions': ''
      });
      // Reset status (non-critical — best effort)
      try {
        await airtableUpdate('Stock Material', s.id, {
          'Status': { name: 'Ordered' }
        });
      } catch(e2) {
        // Status reset failed — not blocking
      }
      toast(`↩️ ${s.tag} — cleared`);
    } catch(e) {
      toast(`Error on ${s.tag}: ${e.message}`, 'error');
    }
  }

  // Delete remnants created by these stock beams — matched via Notes stamp
  let stockIdsToUndo = new Set(toUndo.map(s => s.id));
  let remnantsToDelete = DATA.remnants.filter(r => {
    if (!r.notes) return false;
    let match = r.notes.match(/nesting-app:(.+)/);
    return match && stockIdsToUndo.has(match[1].trim());
  });
  // Fallback: fuzzy match by material + size + length for remnants without stamp
  for (let s of toUndo) {
    if (s.sawInstructions && s.sawInstructions.includes('SAVE REMNANT')) {
      let dropMatch = s.sawInstructions.match(/DROP:([\d'-\s\/]+)\s*->/);
      if (dropMatch) {
        let dropFt = Math.round(cutLengthToInches(dropMatch[1].trim()) / 12 * 10) / 10;
        let fuzzy = DATA.remnants.filter(r =>
          !r.notes.includes('nesting-app:') &&
          r.materialSize === s.materialSize &&
          Math.abs(r.lengthFt - dropFt) < 0.2
        );
        remnantsToDelete.push(...fuzzy);
      }
    }
  }
  // Deduplicate
  let deleteIds = [...new Set(remnantsToDelete.map(r => r.id))];
  for (let remId of deleteIds) {
    try {
      await airtableDelete('Remnants', remId);
      toast(`↩️ Remnant deleted`);
    } catch(e) {
      toast(`⚠️ Could not delete remnant: ${e.message}`, 'warning');
    }
  }

  // Reset delivery status intelligently based on what's still nested
  let affectedDeliveryIds = new Set();
  for (let s of toUndo) {
    if (s.delivery && s.delivery.length > 0) {
      s.delivery.forEach(id => affectedDeliveryIds.add(id));
    }
  }
  let undoneIds = new Set(toUndo.map(s => s.id));
  for (let delivId of affectedDeliveryIds) {
    try {
      let stillNested = DATA.stock.filter(s =>
        s.delivery && s.delivery.includes(delivId) &&
        !undoneIds.has(s.id) &&
        s.assignedParts && s.assignedParts.length > 0 &&
        s.sawInstructions && s.sawInstructions.includes('CF:')
      );
      let newStatus = stillNested.length > 0 ? 'Partially Assigned' : 'Pending Assignment';
      await airtableUpdate('Deliveries', delivId, { 'Nesting Status': newStatus });
      toast(`↩️ Delivery → ${newStatus}`);
    } catch(e) {
      toast(`⚠️ Could not reset delivery status: ${e.message}`, 'warning');
    }
  }

  toast('Undo complete.');
  await loadData();
}

async function runDeliveryNest() {
  let selectedId = DELIVERY_STATE.selectedDeliveryId;
  if (!selectedId) return;

  let selected = DATA.deliveries.find(d => d.id === selectedId);
  if (!selected) return;

  // Get scoped data (Airtable linked fields return arrays of record ID strings)
  let deliveryPartIds = new Set(selected.parts);
  let linkedDeliveryParts = DATA.parts.filter(p =>
    p.pendingDelivery.includes(selectedId) || deliveryPartIds.has(p.id)
  ).filter(p =>
    (!p.stockMaterial || p.stockMaterial.length === 0) && p.cutInches > 0
  );

  // Include manually-pulled job parts
  let manualJob = DELIVERY_STATE.manualJobNumber || '';
  let manualJobParts = [];
  if (manualJob) {
    let linkedIds = new Set(linkedDeliveryParts.map(p => p.id));
    manualJobParts = DATA.parts.filter(p =>
      p.job === manualJob &&
      (!p.stockMaterial || p.stockMaterial.length === 0) &&
      p.cutInches > 0 &&
      !linkedIds.has(p.id)
    );
  }
  let deliveryParts = [...linkedDeliveryParts, ...manualJobParts];

  let deliveryStockIds = new Set(selected.stockMaterial);
  // Only nest against beams that haven't already been assigned
  let deliveryStock = DATA.stock.filter(s =>
    deliveryStockIds.has(s.id) &&
    !(s.sawInstructions && s.sawInstructions.includes('CF:') && s.assignedParts && s.assignedParts.length > 0)
  );

  if (deliveryParts.length === 0 || deliveryStock.length === 0) {
    toast('Need both parts and beams to nest', 'warning');
    return;
  }

  // Convert delivery stock to nesting format (must include usable/totalLength/remaining for optimizer)
  let nestingStock = deliveryStock.map(s => {
    let usable = s.lengthInches - SETTINGS.endTrim;
    return {
      id: s.tag,
      record: s,
      sizeKey: s.sizeKey,
      lengthInches: s.lengthInches,
      totalLength: s.lengthInches,
      usable,
      remaining: usable,
      parts: [],
      type: 'stock'
    };
  }).filter(s => s.usable > 0);

  // Group parts by size key and run nesting
  let groups = getSizeKeyGroups(deliveryParts);
  let results = [];

  for (let sizeKey of Object.keys(groups)) {
    let partsGroup = groups[sizeKey].map(p => ({
      ...p,
      cutInches: p.cutInches
    }));

    // Find matching stock beams for this size key
    let matchingStock = nestingStock.filter(s => {
      let a = (s.sizeKey || '').toUpperCase().replace(/[^A-Z0-9./]/g, '');
      let b = (sizeKey || '').toUpperCase().replace(/[^A-Z0-9./]/g, '');
      return a === b;
    });


    if (matchingStock.length === 0) continue;

    let result = runOptimizer(partsGroup, matchingStock);
    if (result && result.usedStock.length > 0) {
      results.push({ sizeKey, result });
    }
  }

  if (results.length === 0) {
    toast('No matches found between parts and incoming beams', 'warning');
    return;
  }

  // Store results and render
  window._deliveryNestResults = results;
  window._deliverySelectedId = selectedId;

  let resultsEl = document.getElementById('delivery-nest-results');
  if (!resultsEl) return;

  let html = `<div class="card" style="margin-top:16px">
    <div class="card-header">🪚 Nesting Results — Review & Confirm</div>
    <div class="card-body">`;

  for (let gi = 0; gi < results.length; gi++) {
    let { sizeKey, result } = results[gi];
    html += `<div style="margin-bottom:16px"><strong>${escHtml(sizeKey)}</strong></div>`;
    for (let si = 0; si < result.usedStock.length; si++) {
      let sp = result.usedStock[si];
      html += `<label style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <input type="checkbox" class="delivery-stick-chk" data-group="${gi}" data-stick="${si}" checked>
        <span class="mono" style="font-weight:600">${escHtml(sp.id)}</span>
        <span class="text-muted text-sm">${sp.parts.length} part(s)</span>
      </label>`;
      html += renderBarDiagram(sp);
    }
  }

  html += `</div>
    <div style="padding:16px;border-top:1px solid var(--clr-border);display:flex;gap:12px">
      <button class="btn btn-primary btn-lg" onclick="confirmDeliveryNest()">✅ Confirm & Link Parts</button>
      <button class="btn" onclick="document.getElementById('delivery-nest-results').innerHTML=''">Cancel</button>
    </div>
  </div>`;

  resultsEl.innerHTML = html;
  resultsEl.scrollIntoView({ behavior: 'smooth' });
}

async function confirmDeliveryNest() {
  let results = window._deliveryNestResults;
  let selectedId = window._deliverySelectedId;
  if (!results || !selectedId) return;

  let selectedSticks = new Set();
  document.querySelectorAll('.delivery-stick-chk:checked').forEach(cb => {
    selectedSticks.add(`${cb.dataset.group}-${cb.dataset.stick}`);
  });

  if (selectedSticks.size === 0) {
    toast('No beams selected', 'warning');
    return;
  }

  let totalLinked = 0;
  let totalSticks = 0;
  let linkedPartIds = new Set(); // track which parts actually got written
  let today = new Date();
  let yyyy = today.getFullYear();
  let mm = String(today.getMonth() + 1).padStart(2, '0');
  let dd = String(today.getDate()).padStart(2, '0');
  let isoDate = `${yyyy}-${mm}-${dd}`;

  for (let gi = 0; gi < results.length; gi++) {
    let { result } = results[gi];
    for (let si = 0; si < result.usedStock.length; si++) {
      if (!selectedSticks.has(`${gi}-${si}`)) continue;

      let sp = result.usedStock[si];
      try {
        // Build saw instructions
        let sawParts = sp.parts.map(p => `CF:${inchesToShortFeet(p.cutInches)}`);
        let sawInstruction = sawParts.join(' ');
        let dropInches = sp.remaining;
        if (dropInches >= SETTINGS.minRemnant) {
          sawInstruction += ` | DROP:${inchesToDisplay(dropInches)} -> SAVE REMNANT`;
        } else if (dropInches > 1) {
          sawInstruction += ` | DROP:${inchesToDisplay(dropInches)} -> SCRAP`;
        }

        // Link each part to this stock record (critical step)
        let linkedCount = 0;
        for (let p of sp.parts) {
          if (p.id) {
            try {
              await airtableUpdate('Parts', p.id, {
                'Stock Material': [sp.record.id],
                'Material Ordered': true
              });
              linkedCount++;
              linkedPartIds.add(p.id);
            } catch(e) {
              toast(`⚠️ Part ${p.partId || p.id}: ${e.message}`, 'error');
            }
          }
        }
        totalLinked += linkedCount;
        totalSticks++;

        // Update saw instructions (critical — kept separate from status)
        try {
          await airtableUpdate('Stock Material', sp.record.id, {
            'Saw Instructions': sawInstruction
          });
        } catch(e) {
          toast(`⚠️ Saw instructions on ${sp.id}: ${e.message}`, 'warning');
        }
        // Update status to In Fabrication (best effort)
        try {
          await airtableUpdate('Stock Material', sp.record.id, {
            'Status': { name: 'In Fabrication' }
          });
        } catch(e2) { /* not blocking */ }

        // Create remnant if needed (non-critical)
        if (dropInches >= SETTINGS.minRemnant) {
          try {
            await airtableCreate('Remnants', {
              'Material Type': sp.record.materialType,
              'Material Size': sp.record.materialSize,
              'Length (ft)': Math.round(dropInches / 12 * 10) / 10,
              'Status': 'Available',
              'Notes': `nesting-app:${sp.record.id}`
            });
          } catch(e) {
            toast(`⚠️ Remnant create: ${e.message}`, 'warning');
          }
        }

        toast(`✅ ${sp.id} → ${linkedCount} part(s) linked`);
      } catch(e) {
        toast(`⚠️ Error on ${sp.id}: ${e.message}`, 'error');
      }
    }
  }

  // Mark delivery Assigned or Partially Assigned depending on whether all parts fit
  let newStatus = unassignedParts.length > 0 ? 'Partially Assigned' : 'Assigned';
  try {
    await airtableUpdate('Deliveries', selectedId, {
      'Nesting Status': newStatus
    });
  } catch(e) {
    toast(`⚠️ Could not update delivery status: ${e.message}`, 'warning');
  }

  // Find parts from this delivery that never got a stock material link
  // These didn't fit — release them back to ordering queue by clearing Pending Delivery
  let unassignedParts = [];
  let deliveryParts = DATA.parts.filter(p =>
    Array.isArray(p.pendingDelivery) && p.pendingDelivery.includes(selectedId)
  );
  for (let p of deliveryParts) {
    if (!linkedPartIds.has(p.id)) {
      try {
        await airtableUpdate('Parts', p.id, {
          'Pending Delivery': []
        });
        unassignedParts.push(p.partId || p.id);
      } catch(e) {
        // non-critical
      }
    }
  }

  window._showDeliverySuccess = true;
  window._deliverySuccessInfo = { totalLinked, sticks: totalSticks, unassigned: unassignedParts };
  DELIVERY_STATE.manualJobNumber = null;

  await loadData();
}


if (SETTINGS.baseId && SETTINGS.apiKey) {
  loadData();
} else {
  navigateTo('settings');
}
</script>
